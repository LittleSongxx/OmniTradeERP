server:
  port: 8081

spring:
  application:
    name: erp-order-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:mse-d5a70466-nacos-ans.mse.aliyuncs.com}:${NACOS_PORT:-8848}
        namespace: erp-dev
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_HOST:mse-d5a70466-nacos-ans.mse.aliyuncs.com}:${NACOS_PORT:-8848}
        namespace: erp-dev
        group: DEFAULT_GROUP
        file-extension: yml
        shared-configs:
          - data-id: erp-order-service.yml
            group: DEFAULT_GROUP
            refresh: true
        import-check:
          enabled: false
    sentinel:
      transport:
        dashboard: localhost:8858
        port: 8720
      eager: true

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/erp_order?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /erp

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: ASSIGN_ID

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.crossborder.erp: DEBUG