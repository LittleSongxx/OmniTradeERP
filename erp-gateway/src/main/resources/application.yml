server:
  port: 8080

spring:
  application:
    name: erp-gateway
  main:
    web-application-type: reactive
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:localhost}:8848
        namespace: erp-dev
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_HOST:localhost}:8848
        namespace: erp-dev
        group: DEFAULT_GROUP
        file-extension: yml
        import-check:
          enabled: false
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://erp-user-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: order-service
          uri: lb://erp-order-service
          predicates:
            - Path=/api/order/**
          filters:
            - StripPrefix=1
        - id: product-service
          uri: lb://erp-product-service
          predicates:
            - Path=/api/product/**
          filters:
            - StripPrefix=1
        - id: platform-service
          uri: lb://erp-platform-service
          predicates:
            - Path=/api/platform/**
          filters:
            - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: '*'

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.cloud.loadbalancer: DEBUG