server:
  port: 8080

spring:
  application:
    name: erp-gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:mse-d5a70466-nacos-ans.mse.aliyuncs.com}:${NACOS_PORT:-8848}
        namespace: erp-dev
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_HOST:mse-d5a70466-nacos-ans.mse.aliyuncs.com}:${NACOS_PORT:-8848}
        namespace: erp-dev
        group: DEFAULT_GROUP
        file-extension: yml
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # 租户服务（新）
        - id: tenant-service
          uri: lb://erp-tenant-service
          predicates:
            - Path=/api/v1/auth/**,/api/v1/tenant/**
          filters:
            - StripPrefix=1

        # 订单服务（多租户）
        - id: order-service
          uri: lb://erp-order-service
          predicates:
            - Path=/api/order/**
          filters:
            - StripPrefix=2

        # 产品服务（多租户）
        - id: product-service
          uri: lb://erp-product-service
          predicates:
            - Path=/api/product/**
          filters:
            - StripPrefix=2

        # 库存服务（多租户）
        - id: inventory-service
          uri: lb://erp-inventory-service
          predicates:
            - Path=/api/inventory/**
          filters:
            - StripPrefix=2

        # 财务服务（多租户）
        - id: finance-service
          uri: lb://erp-finance-service
          predicates:
            - Path=/api/finance/**
          filters:
            - StripPrefix=2

        # 仓库服务（多租户）
        - id: warehouse-service
          uri: lb://erp-warehouse-service
          predicates:
            - Path=/api/warehouse/**
          filters:
            - StripPrefix=2

        # 平台API服务
        - id: platform-service
          uri: lb://erp-platform-service
          predicates:
            - Path=/api/platform/**
          filters:
            - StripPrefix=2

        # AI 订单异常检测服务 (v1.6.0)
        - id: anomaly-detection-service
          uri: lb://erp-anomaly-detection-service
          predicates:
            - Path=/api/v1/anomaly/**
          filters:
            - StripPrefix=0

        # AI 智能选品推荐服务 (v1.7.0)
        - id: product-recommendation-service
          uri: lb://erp-product-recommendation-service
          predicates:
            - Path=/api/v1/recommend/**
          filters:
            - StripPrefix=0

    sentinel:
      transport:
        dashboard: localhost:8858
        port: 8719
      eager: true

management:
  endpoints:
    web:
      exposure:
        include: '*'

logging:
  level:
    org.springframework.cloud.gateway: INFO