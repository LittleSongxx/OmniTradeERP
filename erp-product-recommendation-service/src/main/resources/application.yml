server:
  port: 8139
  servlet:
    context-path: /

spring:
  application:
    name: erp-product-recommendation-service

  profiles:
    active: dev

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:erp-dev}
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:erp-dev}
        group: DEFAULT_GROUP
        file-extension: yml
        refresh-enabled: true

  datasource:
    url: jdbc:h2:mem:recommendation_dev;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    discovery:
      enabled: true

logging:
  level:
    com.crossborder.recommend: INFO
    com.crossborder.recommend.engine: DEBUG
    com.alibaba.nacos: WARN

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://postgres:5432/erp_recommendation
    username: ${DB_USER:erp}
    password: ${DB_PASS:erp123}